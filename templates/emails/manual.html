<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje sobre {{ event.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f5; margin: 0; padding: 0; }
    .wrapper { max-width: 560px; margin: 32px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .header { background: #18181b; padding: 32px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 22px; font-weight: 700; }
    .header p { color: #a1a1aa; margin: 6px 0 0; font-size: 14px; }
    .body { padding: 32px; }
    .body p { color: #3f3f46; line-height: 1.6; margin: 0 0 16px; }
    .message { background: #f4f4f5; border-radius: 8px; padding: 20px; margin: 20px 0; white-space: pre-wrap; color: #3f3f46; line-height: 1.7; }
    .footer { padding: 20px 32px; background: #f4f4f5; text-align: center; }
    .footer p { color: #a1a1aa; font-size: 12px; margin: 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>EventSync</h1>
      <p>{{ event.title }}</p>
    </div>

    <div class="body">
      <p>Hola <strong>{{ registration.first_name }}</strong>,</p>
      <div class="message">{{ message }}</div>
    </div>

    <div class="footer">
      <p>Este correo fue enviado por el organizador de {{ event.title }} a través de EventSync · No responder</p>
    </div>
  </div>
</body>
</html>
