[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --strict-markers
    --cov=apps
    --cov-report=term-missing
    --cov-report=html
    --ds=config.settings.test
testpaths = apps
